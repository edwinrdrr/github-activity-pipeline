version: 2

models:
  - name: stg_gharchive__events
    description: "Cleaned, renamed GH Archive event stream. One row per public GitHub event."
    columns:
      - name: event_id
        description: "GH Archive event id (string)."
        data_tests:
          - not_null
      - name: event_type
        description: "Event class, e.g. PushEvent, PullRequestEvent."
        data_tests:
          - not_null
          - accepted_values:
              values:
                - PushEvent
                - PullRequestEvent
                - IssuesEvent
                - IssueCommentEvent
                - PullRequestReviewEvent
                - PullRequestReviewCommentEvent
                - WatchEvent
                - ForkEvent
                - CreateEvent
                - DeleteEvent
                - ReleaseEvent
                - PublicEvent
                - MemberEvent
                - GollumEvent
                - CommitCommentEvent
              config:
                severity: warn
      - name: event_at
        description: "Event timestamp (UTC)."
        data_tests:
          - not_null
      - name: event_date
        data_tests:
          - not_null
      - name: actor_id
        description: "GitHub user id of the actor performing the event."
      - name: repo_id
        description: "GitHub repository id."
