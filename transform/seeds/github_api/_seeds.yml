version: 2

# Sample seeds — dev fixtures only. The staging models read from
# `source('github_api', ...)` (the real raw_github_api.* tables); these
# seeds are kept so contributors can run `dbt seed && dbt build --select staging+ --exclude source:github_api`
# without needing GitHub credentials or a GCS bucket. See ADR 0002.
seeds:
  - name: repos_sample
    description: |
      Sample GitHub /repos snapshots — dev fixtures preserved from the
      Week 2 placeholder layout. Not referenced by staging models.
    config:
      column_types:
        created_at: timestamp
        pushed_at: timestamp
        ingested_at: timestamp
    columns:
      - name: id
        description: "GitHub repository numeric id."
        data_tests:
          - not_null
          - unique
      - name: full_name
        description: "owner/repo, e.g. facebook/react."
        data_tests:
          - not_null
      - name: owner_id
        description: "Owner's user/org id. FK → users_sample.id."
        data_tests:
          - not_null
          - relationships:
              to: ref('users_sample')
              field: id
      - name: archived
        description: "True if the repo is archived (read-only)."
        data_tests:
          - not_null
      - name: ingested_at
        description: "Timestamp the ingestion script captured this row."
        data_tests:
          - not_null

  - name: users_sample
    description: |
      Sample GitHub /users snapshots — dev fixtures preserved from the
      Week 2 placeholder layout. Includes both User and Organization
      accounts; type column disambiguates.
    config:
      column_types:
        created_at: timestamp
        ingested_at: timestamp
    columns:
      - name: id
        description: "GitHub user/org numeric id."
        data_tests:
          - not_null
          - unique
      - name: login
        description: "Username or org slug."
        data_tests:
          - not_null
          - unique
      - name: type
        description: "Account type — User, Organization, or Bot."
        data_tests:
          - not_null
          - accepted_values:
              values: [User, Organization, Bot]
      - name: ingested_at
        description: "Timestamp the ingestion script captured this row."
        data_tests:
          - not_null
