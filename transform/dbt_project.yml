name: 'github_activity'
version: '1.0.0'
config-version: 2

profile: 'github_activity'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

vars:
  # How many days of day-level GH Archive tables stg_gharchive__events scans
  # on a full-refresh (its rolling window). Incremental runs use a fixed
  # 3-day lookback. CI shrinks this to a day or two. See ADR 0003.
  gharchive_lookback_days: 95

models:
  github_activity:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: ephemeral
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts
      facts:
        +materialized: incremental
        +on_schema_change: append_new_columns
      dimensions:
        # SCD2 dims (dim_repos, dim_users) and Type 1 lookups (dim_languages,
        # dim_dates) all full-rebuild as tables — see docs/adr/0004-scd2-design.md.
        +materialized: table

seeds:
  github_activity:
    +schema: seeds
  # Override dbt_project_evaluator's empty default exceptions seed with our
  # own (transform/seeds/dbt_project_evaluator_exceptions.csv). Disabling the
  # package's copy is what flips the filter_exceptions macro on — see
  # docs/week-5.md. Documented exceptions:
  #   - dim_dates is a root model (generated by dbt_date; no source/ref).
  #   - dim_users legitimately rejoins stg_github_api__users (directly for
  #     metadata + via int_user_contributor_tier_snapshots for tier).
  dbt_project_evaluator:
    dbt_project_evaluator_exceptions:
      +enabled: false
